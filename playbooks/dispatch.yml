---
- name: "Playbook to upgrade CaC from AAP <= 2.4 to AAP >= 2.5 format"
  hosts: localhost
  connection: local
  gather_facts: false
  vars:
    personal_access_token: "{{ lookup('ansible.builtin.env', 'GITHUB_TOKEN') }}"
    software_repository: https://{{ personal_access_token }}@github.com/taiseerhussein/aap24-configuration.git
    local_repo: /var/tmp/github/aap24_conversion
    git_name: taiseerhussein
    git_email: tkhussein@yahoo.com

    flatten: true
    filetree_read_organizations: false
    input_path: "{{ local_repo }}/{{ aap24_configs }}"

  tasks:

    - name: Determine that both AAP and Machine credentials are set
      ansible.builtin.assert:
        that:
          - "lookup('ansible.builtin.env', 'CONTROLLER_USERNAME') !=''"
          - "lookup('ansible.builtin.env', 'CONTROLLER_HOST') !=''"
          - "lookup('ansible.builtin.env', 'CONTROLLER_PASSWORD') !=''"
        fail_msg:
          - "Red Hat Ansible Automation Platform credential is not set"
          - "Please assign correct credentials to the Job Template"

    - name: Create a new token
      ansible.controller.token:
        controller_host: "{{ lookup('ansible.builtin.env', 'CONTROLLER_HOST') }}"
        controller_username: "{{ lookup('ansible.builtin.env', 'CONTROLLER_USERNAME') }}"
        controller_password: "{{ lookup('ansible.builtin.env', 'CONTROLLER_PASSWORD') }}"
        validate_certs: false
        description: Controller export
        scope: write
        state: present

    - name: Printout my token
      ansible.builtin.debug:
        msg:
          - "{{ ansible_facts['controller_token']['token'] }}"

    - name: "Set the oauth token to be used since now"
      ansible.builtin.set_fact:
        controller_oauthtoken: "{{ ansible_facts['controller_token']['token'] }}"

    - name: Set controller_validate_certs
      ansible.builtin.set_fact:
        controller_validate_certs: false

    - name: Set controller_hostname
      ansible.builtin.set_fact:
        controller_hostname: "{{ lookup('ansible.builtin.env', 'CONTROLLER_HOST') }}"

    - name: Clone the software repository
      register: clone_result
      run_once: true
      when: software_repository is defined
      ansible.builtin.git:
        repo: "{{ software_repository }}"
        dest: "{{ local_repo }}"
        accept_hostkey: true
        force: true
        version: main

    - name: Load normalized variable files
      ansible.builtin.include_vars:
        dir: "{{ aap24_configs }}"
        extensions:
          - yml
          - yaml
        ignore_unknown_extensions: true

    - name: Show loaded variable counts
      ansible.builtin.debug:
        msg:
          organizations: "{{ controller_organizations | default([]) | length }}"
          users: "{{ controller_users | default([]) | length }}"
          teams: "{{ controller_teams | default([]) | length }}"
          credentials: "{{ controller_credentials | default([]) | length }}"
          projects: "{{ controller_projects | default([]) | length }}"
          inventories: "{{ controller_inventories | default([]) | length }}"
          job_templates: "{{ controller_templates | default(controller_job_templates | default([])) | length }}"
    - name: Create gateway organizations
      ansible.platform.organization:
        name: "{{ item.name }}"
        description: "{{ item.description | default(omit) }}"
        state: present
        aap_hostname: "{{ aap_hostname }}"
        aap_username: "{{ aap_username }}"
        aap_password: "{{ aap_password }}"
        aap_validate_certs: "{{ aap_validate_certs }}"
      loop: "{{ gateway_organizations | default([]) }}"

    - name: Create gateway users
      ansible.platform.user:
        username: "{{ item.username }}"
        first_name: "{{ item.first_name | default(omit) }}"
        last_name: "{{ item.last_name | default(omit) }}"
        email: "{{ item.email | default(omit) }}"
        is_superuser: "{{ item.is_superuser | default(false) }}"
        password: "{{ item.password | default(omit) }}"
        state: present
        aap_hostname: "{{ aap_hostname }}"
        aap_username: "{{ aap_username }}"
        aap_password: "{{ aap_password }}"
        aap_validate_certs: "{{ aap_validate_certs }}"
      loop: "{{ gateway_users | default([]) }}"

    - name: Create gateway teams
      ansible.platform.team:
        name: "{{ item.name }}"
        organization: "{{ item.organization }}"
        description: "{{ item.description | default(omit) }}"
        state: present
        aap_hostname: "{{ aap_hostname }}"
        aap_username: "{{ aap_username }}"
        aap_password: "{{ aap_password }}"
        aap_validate_certs: "{{ aap_validate_certs }}"
      loop: "{{ gateway_teams | default([]) }}"

    - name: Apply gateway role assignments
      ansible.platform.role_user_assignment:
        user: "{{ item.user }}"
        role_definition: "{{ item.role_definition }}"
        object_id: "{{ item.object_id | default(omit) }}"
        content_type: "{{ item.content_type | default(omit) }}"
        state: present
        aap_hostname: "{{ aap_hostname }}"
        aap_username: "{{ aap_username }}"
        aap_password: "{{ aap_password }}"
        aap_validate_certs: "{{ aap_validate_certs }}"
      loop: "{{ gateway_role_assignments | default([]) }}"

  roles:
    - role: infra.controller_configuration.credential_types
      when: controller_credential_types is defined

    - role: infra.controller_configuration.credentials
      when: controller_credentials is defined

    - role: infra.controller_configuration.projects
      when: controller_projects is defined

    - role: infra.controller_configuration.inventories
      when: controller_inventories is defined

    - role: infra.controller_configuration.inventory_sources
      when: controller_inventory_sources is defined

    - role: infra.controller_configuration.hosts
      when: controller_hosts is defined

    - role: infra.controller_configuration.groups
      when: controller_groups is defined

    - role: infra.controller_configuration.job_templates
      when: controller_templates is defined or controller_job_templates is defined

    - role: infra.controller_configuration.workflow_job_templates
      when: controller_workflows is defined or controller_workflow_job_templates is defined

    - role: infra.controller_configuration.notification_templates
      when: controller_notifications is defined or controller_notification_templates is defined

    - role: infra.controller_configuration.schedules
      when: controller_schedules is defined