---
controller_credential_types:
  - name: "demo-cred-type"
    description: ""
    kind: "cloud"
    inputs:
      fields:
      - id: api_key
        type: string
        label: API Key
        secret: true
      - id: api_host
        type: string
        label: API Host
      required:
      - api_key
      - api_host

    injectors:
      env:
        API_KEY: !unsafe '{{ api_key }}'
        API_HOST: !unsafe '{{ api_host }}'
...
